<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="512" height="512" fill="#000000"/>
  <rect x="6" y="6" width="500" height="500" stroke="#c9a84c" stroke-width="5" fill="none" opacity="0.6"/>
  <!-- Camera body -->
  <rect x="36" y="155" width="390" height="240" rx="4" fill="#f5f0e8"/>
  <!-- Lens outer -->
  <circle cx="230" cy="275" r="105" fill="#000"/>
  <!-- Lens mid -->
  <circle cx="230" cy="275" r="72" fill="#f5f0e8"/>
  <!-- Lens inner -->
  <circle cx="230" cy="275" r="40" fill="#000"/>
  <!-- Lens glint -->
  <circle cx="252" cy="253" r="15" fill="rgba(255,255,255,0.5)"/>
  <!-- Viewfinder -->
  <rect x="275" y="85" width="130" height="75" rx="3" fill="#f5f0e8"/>
  <!-- Sprocket holes left -->
  <rect x="36" y="155" width="46" height="50" fill="#000" opacity="0.5"/>
  <rect x="36" y="345" width="46" height="50" fill="#000" opacity="0.5"/>
  <!-- Side trigger -->
  <rect x="424" y="195" width="54" height="48" rx="3" fill="#f5f0e8"/>
  <rect x="424" y="310" width="54" height="48" rx="3" fill="#f5f0e8"/>
  <!-- Gold accent line -->
  <rect x="36" y="386" width="390" height="9" fill="#c9a84c" opacity="0.7"/>
  <!-- NFI text -->
  <text x="315" y="376" text-anchor="middle" fill="#000" font-family="Montserrat, Arial, sans-serif" font-weight="900" font-size="50" letter-spacing="8">NFI</text>
  <!-- FOCUS at bottom -->
  <text x="256" y="468" text-anchor="middle" fill="#c9a84c" font-family="Montserrat, Arial, sans-serif" font-weight="300" font-size="30" letter-spacing="10">FOCUS</text>
</svg>
