<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="512" height="512" fill="#000000"/>
  <!-- Gold border double -->
  <rect x="5" y="5" width="502" height="502" stroke="#c9a84c" stroke-width="5" fill="none"/>
  <rect x="13" y="13" width="486" height="486" stroke="#785e23" stroke-width="2" fill="none"/>

  <!-- Camera body - cream -->
  <rect x="30" y="120" width="452" height="272" rx="4" fill="#f5f0e8"/>

  <!-- Left panel - slightly darker -->
  <rect x="30" y="120" width="48" height="272" fill="#d2c6ae"/>
  <!-- Right panel - slightly darker -->
  <rect x="434" y="120" width="48" height="272" fill="#d2c6ae"/>
  <!-- Top strip -->
  <rect x="30" y="120" width="452" height="34" fill="#e1d6be"/>
  <!-- Gold top line -->
  <rect x="30" y="120" width="452" height="4" fill="#c9a84c"/>

  <!-- Viewfinder -->
  <rect x="282" y="68" width="132" height="58" rx="3" fill="#e1d6be"/>
  <rect x="282" y="68" width="132" height="58" rx="3" stroke="#c9a84c" stroke-width="3" fill="none"/>
  <rect x="292" y="78" width="112" height="38" rx="2" fill="#111"/>

  <!-- Sprocket holes -->
  <rect x="35" y="140" width="40" height="30" fill="#000" stroke="#785e23" stroke-width="1"/>
  <rect x="35" y="332" width="40" height="30" fill="#000" stroke="#785e23" stroke-width="1"/>

  <!-- Side triggers -->
  <rect x="438" y="168" width="46" height="38" rx="2" fill="#e1d6be" stroke="#785e23" stroke-width="1.5"/>
  <rect x="438" y="288" width="46" height="38" rx="2" fill="#e1d6be" stroke="#785e23" stroke-width="1.5"/>

  <!-- Lens rings -->
  <circle cx="192" cy="256" r="92" fill="#c9a84c"/>
  <circle cx="192" cy="256" r="84" fill="#1a1a1a"/>
  <circle cx="192" cy="256" r="72" fill="#e1d6be"/>
  <circle cx="192" cy="256" r="60" fill="#333"/>
  <circle cx="192" cy="256" r="46" fill="#0e1218"/>
  <circle cx="192" cy="256" r="28" fill="#000"/>
  <!-- Glint -->
  <circle cx="212" cy="234" r="13" fill="rgba(200,220,255,0.6)"/>

  <!-- Gold accent line -->
  <rect x="88" y="348" width="336" height="7" fill="#c9a84c"/>

  <!-- NFI - bottom right of camera body, above gold line -->
  <text x="410" y="344" text-anchor="end" fill="#000000"
    font-family="Arial, sans-serif" font-weight="900" font-size="68" letter-spacing="2">NFI</text>

  <!-- FOCUS - big bold spaced gold at bottom -->
  <text x="256" y="430" text-anchor="middle" fill="#c9a84c"
    font-family="Arial, sans-serif" font-weight="900" font-size="62" letter-spacing="18">FOCUS</text>
</svg>
